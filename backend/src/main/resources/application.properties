# =========================
# Spring
# =========================
spring.application.name=Calendar
server.port=8080

# =========================
# App / Timezone
# =========================
app.zone=America/Sao_Paulo

# =========================
# Área atendida
# =========================
app.service.city=
app.service.state=
app.service.allowedCities=Itabirito,Ouro Preto,Moeda
app.service.allowedState=MG

# =========================
# Pendência / OTP
# =========================
app.pending.ttlMinutes=10
app.pending.blockOtherBookings=true
app.otp.ttlSeconds=300
app.otp.resendAfterSeconds=3

# =========================
# Histórico
# =========================
app.history.retentionMonths=2

# =========================
# WhatsApp Cloud API
# =========================
whatsapp.enabled=${WHATSAPP_ENABLED:false}
whatsapp.token=${WHATSAPP_TOKEN:}
whatsapp.phoneNumberId=${WHATSAPP_PHONE_NUMBER_ID:}
whatsapp.templateName=${WHATSAPP_TEMPLATE_NAME:}
whatsapp.language=${WHATSAPP_LANGUAGE:pt_BR}

# =========================
# Supabase
# =========================
supabase.enabled=${SUPABASE_ENABLED:false}
supabase.url=${SUPABASE_URL:}
supabase.key=${SUPABASE_KEY:}
supabase.schema=${SUPABASE_SCHEMA:public}
supabase.table.verification_sessions=${SUPABASE_TABLE_VERIFICATION_SESSIONS:verification_sessions}
supabase.table.pending_records=${SUPABASE_TABLE_PENDING_RECORDS:pending_records}
supabase.table.history_records=${SUPABASE_TABLE_HISTORY_RECORDS:history_records}

# =========================
# Google Routes (proxy)
# =========================
google.maps.enabled=${GOOGLE_MAPS_ENABLED:false}
google.maps.apiKey=${GOOGLE_MAPS_API_KEY:}
google.maps.routes.traffic=${GOOGLE_MAPS_ROUTES_TRAFFIC:true}
google.maps.routes.fieldMask=${GOOGLE_MAPS_ROUTES_FIELDMASK:routes.distanceMeters,routes.duration,routes.polyline.encodedPolyline}

# =========================
# Banking / Extrato (admin)
# =========================
banking.enabled=${BANKING_ENABLED:false}
banking.provider=${BANKING_PROVIDER:DUMMY}

# =========================
# Banco Inter PJ (extrato)
# =========================
inter.enabled=${INTER_ENABLED:false}
inter.baseUrl=${INTER_BASE_URL:}
inter.oauth.tokenPath=${INTER_OAUTH_TOKEN_PATH:/oauth/v2/token}
inter.oauth.scope=${INTER_OAUTH_SCOPE:}
inter.clientId=${INTER_CLIENT_ID:}
inter.clientSecret=${INTER_CLIENT_SECRET:}
inter.certP12Path=${INTER_CERT_P12_PATH:}
inter.certP12Password=${INTER_CERT_P12_PASSWORD:}
inter.contaCorrente=${INTER_CONTA_CORRENTE:}
inter.banking.statementPath=${INTER_BANKING_STATEMENT_PATH:/banking/v2/extrato}
inter.banking.fromParam=${INTER_BANKING_FROM_PARAM:dataInicio}
inter.banking.toParam=${INTER_BANKING_TO_PARAM:dataFim}

# =========================
# 4x4
# =========================
app.schedule.cycleStart=2026-02-21

# =========================
# Admin / Dashboard
# =========================
app.admin.bulkCancel.maxItems=200

# =========================
# Expediente / disponibilidade
# =========================
app.schedule.workStart=08:00
app.schedule.workEnd=18:00
app.schedule.lunchStart=12:00
app.schedule.lunchEnd=13:00