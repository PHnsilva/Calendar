spring.application.name=Calendar
server.port=8080

app.zone=America/Sao_Paulo

# ===== Área atendida (A) =====
# legado (se quiser manter compat)
app.service.city=
app.service.state=

# novo: múltiplas cidades via CSV (normalizador pode tratar acentos)
app.service.allowedCities=Itabirito,Ouro Preto,Moeda
app.service.allowedState=MG

# ===== Pendência / OTP =====
app.pending.ttlMinutes=10
app.otp.ttlSeconds=300
app.otp.resendAfterSeconds=3

# ===== WhatsApp Cloud API =====
whatsapp.enabled=false
whatsapp.token=
whatsapp.phoneNumberId=
whatsapp.templateName=
whatsapp.language=pt_BR

# ===== Supabase =====
supabase.enabled=false
supabase.url=
supabase.key=
supabase.schema=public
supabase.table.verification_sessions=verification_sessions
supabase.table.pending_records=pending_records
supabase.table.history_records=history_records

# ===== Google Routes (rota no site via backend proxy) =====
google.maps.enabled=false
google.maps.apiKey=
google.maps.routes.traffic=true
google.maps.routes.fieldMask=routes.distanceMeters,routes.duration,routes.polyline.encodedPolyline